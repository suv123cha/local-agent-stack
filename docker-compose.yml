version: "3.9"

services:
  # ─────────────────────────────────────────────
  # BACKEND – FastAPI Agent Orchestrator
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - MONGO_URL=mongodb://mongo:27017
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
    depends_on:
      - redis
      - qdrant
      - mongo
      - ollama
    volumes:
      - ./backend:/app
    networks:
      - agent-net

  # ─────────────────────────────────────────────
  # FRONTEND – React + Vite Chat UI
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/chat-ui
      dockerfile: Dockerfile
    container_name: agent-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - agent-net

  # ─────────────────────────────────────────────
  # QDRANT – Vector Memory Store
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agent-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agent-net

  # ─────────────────────────────────────────────
  # REDIS – Short-term / Session Memory
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agent-net

  # ─────────────────────────────────────────────
  # MONGODB – Structured User Profile Memory
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: agent-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - agent-net

  # ─────────────────────────────────────────────
  # OLLAMA – Local LLM Runtime
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agent-net

volumes:
  qdrant_data:
  redis_data:
  mongo_data:
  ollama_data:

networks:
  agent-net:
    driver: bridge
